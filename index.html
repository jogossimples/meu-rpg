<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Simulator</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 3px solid #f1c40f; background: #2ecc71; touch-action: none; margin-top: 10px; border-radius: 15px; }
        .ui-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn-game { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); pointer-events: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .move-btn { background: rgba(52, 152, 219, 0.7); } /* Azul para andar */
        .attack-btn { background: rgba(231, 76, 60, 0.7); } /* Vermelho para atacar */
        #status { position: absolute; top: 10px; font-size: 18px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="status">Brawlers Restantes: 10</div>
<canvas id="brawlCanvas"></canvas>

<div class="ui-container">
    <div class="btn-game move-btn" id="btnMove">ANDAR</div>
    <div class="btn-game attack-btn" id="btnAttack">TIRO</div>
</div>

<script>
    const canvas = document.getElementById("brawlCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.6;

    let brawler = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: 20,
        color: "#3498db",
        speed: 4,
        dir: "direita"
    };

    let tiros = [];
    let estaAndando = false;

    // --- CONTROLES ---
    const btnMove = document.getElementById("btnMove");
    const btnAttack = document.getElementById("btnAttack");

    // Movimentação (Simplificada para o exemplo)
    btnMove.ontouchstart = () => estaAndando = true;
    btnMove.ontouchend = () => estaAndando = false;
    btnMove.onmousedown = () => estaAndando = true;
    btnMove.onmouseup = () => estaAndando = false;

    // Ataque
    function atirar() {
        tiros.push({
            x: brawler.x,
            y: brawler.y,
            vx: brawler.dir === "direita" ? 8 : (brawler.dir === "esquerda" ? -8 : 0),
            vy: brawler.dir === "baixo" ? 8 : (brawler.dir === "cima" ? -8 : 0),
            vida: 40 // tempo que o tiro dura
        });
    }
    btnAttack.onclick = atirar;

    // Detectar direção pelo clique no botão de andar (ou use setas do teclado)
    window.addEventListener("keydown", (e) => {
        if(e.key === "ArrowRight") brawler.dir = "direita";
        if(e.key === "ArrowLeft") brawler.dir = "esquerda";
        if(e.key === "ArrowUp") brawler.dir = "cima";
        if(e.key === "ArrowDown") brawler.dir = "baixo";
        estaAndando = true;
    });
    window.addEventListener("keyup", () => estaAndando = false);

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimentação
        if (estaAndando) {
            if (brawler.dir === "direita") brawler.x += brawler.speed;
            if (brawler.dir === "esquerda") brawler.x -= brawler.speed;
            if (brawler.dir === "cima") brawler.y -= brawler.speed;
            if (brawler.dir === "baixo") brawler.y += brawler.speed;
        }

        // Desenhar Tiros
        tiros.forEach((t, i) => {
            t.x += t.vx;
            t.y += t.vy;
            t.vida--;
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(t.x, t.y, 5, 0, Math.PI*2);
            ctx.fill();
            if(t.vida <= 0) tiros.splice(i, 1);
        });

        // Desenhar Brawler (Círculo com "frente")
        ctx.fillStyle = brawler.color;
        ctx.beginPath();
        ctx.arc(brawler.x, brawler.y, brawler.r, 0, Math.PI*2);
        ctx.fill();
        
        // Indicador de mira
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(brawler.x, brawler.y);
        let miraX = brawler.x + (brawler.dir === "direita" ? 30 : brawler.dir === "esquerda" ? -30 : 0);
        let miraY = brawler.y + (brawler.dir === "baixo" ? 30 : brawler.dir === "cima" ? -30 : 0);
        ctx.lineTo(miraX, miraY);
        ctx.stroke();

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
