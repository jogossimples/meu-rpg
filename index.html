<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Box Simulator</title>
    <style>
        body { margin: 0; background: #1a2a6c; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); 
               color: white; font-family: 'Arial Black', sans-serif; text-align: center; height: 100vh; overflow: hidden; }
        
        .header { padding: 20px; text-shadow: 2px 2px #000; }
        
        #caixa-container { margin: 50px auto; cursor: pointer; transition: transform 0.2s; }
        #caixa-container:active { transform: scale(0.9); }
        #caixa-img { width: 200px; filter: drop-shadow(0 0 10px gold); }

        #resultado { font-size: 24px; margin-top: 20px; min-height: 50px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; }

        /* Estilo do Brawler Ganho */
        .brawler-card { display: inline-block; padding: 15px; border-radius: 10px; border: 4px solid #fff; 
                        margin-top: 20px; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        .raro { background: #3498db; }    /* Raro - Azul */
        .epico { background: #9b59b6; }   /* Épico - Roxo */
        .lendario { background: #f1c40f; color: #000; } /* Lendário - Amarelo */
    </style>
</head>
<body>

    <div class="header">
        <h1>BRAWL SIMULATOR</h1>
        <div class="stats">
            <div>Moedas: <span id="moedas">0</span></div>
            <div>Brawlers: <span id="total-brawlers">0/10</span></div>
        </div>
    </div>

    <div id="caixa-container" onclick="abrirCaixa()">
        <img id="caixa-img" src="https://cdn-icons-png.flaticon.com/512/3555/3555891.png" alt="Caixa">
        <p>CLIQUE NA CAIXA!</p>
    </div>

    <div id="resultado"></div>

    <script>
        let moedas = 0;
        let brawlersGanhou = [];

        // Lista de Brawlers (Nome e Raridade)
        const listaBrawlers = [
            { nome: "Shelly", raridade: "raro" },
            { nome: "Colt", raridade: "raro" },
            { nome: "El Primo", raridade: "raro" },
            { nome: "Poco", raridade: "raro" },
            { nome: "Piper", raridade: "epico" },
            { nome: "Frank", raridade: "epico" },
            { nome: "Bibi", raridade: "epico" },
            { nome: "Leon", raridade: "lendario" },
            { nome: "Crow", raridade: "lendario" },
            { nome: "Spike", raridade: "lendario" }
        ];

        function abrirCaixa() {
            const resDiv = document.getElementById("resultado");
            
            // Sorteia um número de 0 a 100
            let sorte = Math.random() * 100;
            let brawlerSorteado = null;

            // Lógica de Probabilidade
            if (sorte > 95) { // 5% de chance
                brawlerSorteado = sortearDaLista("lendario");
            } else if (sorte > 80) { // 15% de chance
                brawlerSorteado = sortearDaLista("epico");
            } else {
                brawlerSorteado = sortearDaLista("raro");
            }

            // Ganhar moedas sempre
            moedas += Math.floor(Math.random() * 50) + 10;
            document.getElementById("moedas").innerText = moedas;

            // Exibir na tela
            resDiv.innerHTML = `
                <div class="brawler-card ${brawlerSorteado.raridade}">
                    <small>${brawlerSorteado.raridade.toUpperCase()}</small><br>
                    <strong>${brawlerSorteado.nome}</strong>
                </div>
            `;

            // Adicionar à coleção se for novo
            if (!brawlersGanhou.includes(brawlerSorteado.nome)) {
                brawlersGanhou.push(brawlerSorteado.nome);
                document.getElementById("total-brawlers").innerText = brawlersGanhou.length + "/10";
            }
        }

        function sortearDaLista(raridade) {
            const filtrados = listaBrawlers.filter(b => b.raridade === raridade);
            return filtrados[Math.floor(Math.random() * filtrados.length)];
        }
    </script>
</body>
</html>
