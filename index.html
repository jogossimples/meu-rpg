<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Box Simulator</title>
    <style>
        :root {
            --azul-brawl: #1e90ff;
            --amarelo-brawl: #f1c40f;
            --roxo-brawl: #8e44ad;
        }

        body {
            margin: 0;
            padding: 0;
            background: url('https://images.wallpapersden.com/image/download/brawl-stars-game-art_a2tpaGWUmZqaraWkpJRmbmdlrWZlbWU.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Arial Black', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* BARRA SUPERIOR (Recursos) */
        .top-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .resource {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        /* MENU LATERAL (Esquerda) */
        .side-menu {
            width: 80px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
            border-right: 3px solid var(--amarelo-brawl);
        }

        .menu-item {
            width: 60px;
            height: 60px;
            background: var(--azul-brawl);
            border-radius: 10px;
            border: 3px solid white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
        }

        /* ÁREA PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .brawler-display {
            width: 300px;
            filter: drop-shadow(0 0 20px gold);
            transition: transform 0.3s;
        }

        .box-button {
            position: absolute;
            bottom: 40px;
            background: #ff4757;
            padding: 15px 40px;
            border-radius: 15px;
            border: 4px solid white;
            font-size: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c0392b;
        }

        .box-button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* Janela de Resultado */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #brawler-ganho img { width: 250px; }
    </style>
</head>
<body>

    <div class="side-menu">
        <div class="menu-item" style="background: #2ed573;">SHOP</div>
        <div class="menu-item">BRAWLERS</div>
        <div class="menu-item" style="background: #ffa502;">PRIZES</div>
    </div>

    <div class="top-bar">
        <div class="resource">🟢 <span id="gems">999</span></div>
        <div class="resource">⭐ <span id="star">99</span></div>
        <div class="resource" style="border-color: gold;">🟡 <span id="coins">5423</span></div>
    </div>

    <div class="main-content">
        <img id="current-brawler" class="brawler-display" src="https://vignette.wikia.nocookie.net/brawlstars/images/e/e4/Leon_Portrait.png" alt="Brawler">
        
        <button class="box-button" onclick="abrirCaixa()">ABRIR CAIXA</button>
    </div>

    <div id="overlay" onclick="fecharCard()">
        <h1 id="raridade-texto">LENDÁRIO!</h1>
        <div id="brawler-ganho"></div>
        <p>Clique para continuar</p>
    </div>

    <script>
        const brawlers = [
            { nome: "Crow", img: "https://vignette.wikia.nocookie.net/brawlstars/images/4/42/Crow_Portrait.png", raridade: "LENDÁRIO", cor: "gold" },
            { nome: "Spike", img: "https://vignette.wikia.nocookie.net/brawlstars/images/1/19/Spike_Portrait.png", raridade: "LENDÁRIO", cor: "gold" },
            { nome: "Mortis", img: "https://vignette.wikia.nocookie.net/brawlstars/images/0/0e/Mortis_Portrait.png", raridade: "MÍTICO", cor: "red" }
        ];

        function abrirCaixa() {
            const sorteado = brawlers[Math.floor(Math.random() * brawlers.length)];
            const overlay = document.getElementById("overlay");
            const bDiv = document.getElementById("brawler-ganho");
            const rTxt = document.getElementById("raridade-texto");

            rTxt.innerText = sorteado.raridade + "!";
            rTxt.style.color = sorteado.cor;
            bDiv.innerHTML = `<img src="${sorteado.img}"><h2>${sorteado.nome}</h2>`;
            
            overlay.style.display = "flex";
        }

        function fecharCard() {
            document.getElementById("overlay").style.display = "none";
        }
    </script>
</body>
</html>
