<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 450px;
            background-color: #f2d398;
            border: 5px solid #8b5a2b;
        }

        /* Barra de status superior */
        #status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #5a3e2b;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 20px;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar {
            height: 15px;
            border: 1px solid #ccc;
            margin-left: 5px;
            border-radius: 3px;
            overflow: hidden;
        }

        #hp-bar-fill {
            width: 95%; /* Valor exemplo */
            height: 100%;
            background-color: #ff4444;
        }

        #mp-bar-fill {
            width: 20%; /* Valor exemplo */
            height: 100%;
            background-color: #4444ff;
        }

        /* Botão Town */
        #btn-town {
            position: absolute;
            top: 40px;
            left: 20px;
            padding: 8px 15px;
            background-color: #8b5a2b;
            color: white;
            border: 2px solid #d2b48c;
            cursor: pointer;
        }

        /* Torre e mapa */
        #map-area {
            position: absolute;
            top: 40px;
            left: 120px;
            width: 400px;
            height: 350px;
            background: linear-gradient(to bottom, #f2d398 0%, #8bc34a 100%);
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 5px;
        }

        .map-tile {
            width: 36px;
            height: 36px;
            background-color: rgba(255,255,255,0.2);
            border: 1px solid #8b5a2b;
        }

        .tower {
            position: absolute;
            top: 60px;
            left: 220px;
            width: 120px;
            height: 280px;
            background-image: url('https://via.placeholder.com/120x280.png?text=TORRE');
            background-size: cover;
        }

        .statue {
            position: absolute;
            top: 80px;
            left: 400px;
            width: 80px;
            height: 120px;
            background-image: url('https://via.placeholder.com/80x120.png?text=ESTATUA');
            background-size: cover;
        }

        /* Painel de upgrades */
        #upgrade-panel {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 220px;
            background-color: #5a3e2b;
            border: 2px solid #d2b48c;
            padding: 10px;
            color: white;
        }

        .upgrade-btn {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: #4285f4;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .upgrade-btn:hover {
            background-color: #3367d6;
        }

        /* Itens e botões inferiores */
        #items-grid {
            position: absolute;
            bottom: 40px;
            right: 20px;
            width: 220px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .item-slot {
            width: 50px;
            height: 50px;
            background-color: #8b5a2b;
            border: 1px solid #d2b48c;
            background-image: url('https://via.placeholder.com/50x50.png?text=ITEM');
            background-size: cover;
        }

        #bottom-buttons {
            position: absolute;
            bottom: 10px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .game-btn {
            width: 50px;
            height: 50px;
            background-color: #8b5a2b;
            border: 2px solid #d2b48c;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 10px;
        }

        .game-btn i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        #action-buttons {
            position: absolute;
            bottom: 10px;
            right: 20px;
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .action-btn {
            width: 70px;
            height: 60px;
            background-color: #8b5a2b;
            border: 2px solid #d2b48c;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 10px;
        }

        .action-btn i {
            font-size: 25px;
            margin-bottom: 2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="game-container">
        <!-- Barra de status -->
        <div id="status-bar">
            <div class="resource">
                <i class="fas fa-coins"></i> 5,475,214
            </div>
            <div class="resource">
                <i class="fas fa-gem"></i> 25
            </div>
            <div class="resource">
                HP <div class="bar"><div id="hp-bar-fill"></div></div> 754,372 / 800,000
            </div>
            <div class="resource">
                MP <div class="bar"><div id="mp-bar-fill"></div></div> 21,405 / 100,000
            </div>
            <div class="resource">
                <i class="fas fa-shield-alt"></i> 4296
            </div>
        </div>

        <!-- Botão Town -->
        <button id="btn-town">&lt;TOWN</button>

        <!-- Área do mapa e torre -->
        <div id="map-area">
            <!-- Tiles do mapa gerados via JS -->
        </div>
        <div class="tower"></div>
        <div class="statue"></div>

        <!-- Painel de upgrades -->
        <div id="upgrade-panel">
            <h3>UPGRADES</h3>
            <button class="upgrade-btn">UPGRADE CASTLE<br><span>925,000 G</span></button>
            <button class="upgrade-btn">UPGRADE ARCHER<br><span>600,000 G</span></button>
        </div>

        <!-- Grid de itens -->
        <div id="items-grid">
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
        </div>

        <!-- Botões inferiores esquerda -->
        <div id="bottom-buttons">
            <button class="game-btn"><i class="fas fa-cog"></i> SET</button>
            <button class="game-btn"><i class="fas fa-trophy"></i> RANK</button>
            <button class="game-btn"><i class="fas fa-save"></i> SAVE</button>
            <button class="game-btn"><i class="fas fa-swords"></i> SKILL</button>
            <button class="game-btn"><i class="fas fa-diamond"></i> SHOP</button>
            <button class="game-btn"><i class="fas fa-calendar"></i> EVENT</button>
        </div>

        <!-- Botões de ação inferior direita -->
        <div id="action-buttons">
            <button class="action-btn"><i class="fas fa-skull-crossbones"></i> HELL</button>
            <button class="action-btn"><i class="fas fa-shield-alt"></i> REPLAY</button>
            <button class="action-btn"><i class="fas fa-swords"></i> BATTLE</button>
        </div>
    </div>

    <script>
        // Gerar tiles do mapa
        const mapArea = document.getElementById('map-area');
        for (let i = 0; i < 30; i++) {
            const tile = document.createElement('div');
            tile.classList.add('map-tile');
            mapArea.appendChild(tile);
        }

        // Função básica para upgrades (apenas feedback visual)
        const upgradeBtns = document.querySelectorAll('.upgrade-btn');
        upgradeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const cost = btn.querySelector('span').textContent;
                alert(`Tentando upgrade! Custo: ${cost}\n(Implemente a lógica de recursos aqui)`);
            });
        });

        // Botão BATTLE (iniciar waves)
        document.querySelector('.action-btn:last-child').addEventListener('click', () => {
            alert('Iniciando waves de inimigos!\n(Implemente o sistema de waves aqui)');
        });
    </script>
</body>
    </html>
