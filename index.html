<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Simulator Ultra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        :root {
            --gold: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            --mythic: linear-gradient(180deg, #FF0066 0%, #800033 100%);
            --rare: linear-gradient(180deg, #00FF00 0%, #006400 100%);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            font-family: 'Lilita One', cursive;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* HEADER ESTILO SUPERCELL */
        .header {
            display: flex; justify-content: flex-end;
            padding: 15px; gap: 15px;
            background: rgba(0,0,0,0.3);
        }

        .res-item {
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 50px;
            padding: 5px 20px;
            display: flex; align-items: center;
            gap: 10px; min-width: 100px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.5);
        }

        /* MENU LATERAL SLIM */
        .sidebar {
            position: absolute; left: 0; top: 20%;
            display: flex; flex-direction: column; gap: 10px;
        }

        .side-btn {
            width: 70px; height: 60px;
            background: #2980b9; border: 4px solid #fff;
            border-radius: 0 15px 15px 0;
            cursor: pointer; transition: 0.2s;
        }

        .side-btn:hover { transform: translateX(10px); }

        /* PALCO PRINCIPAL */
        .stage {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .brawler-hero {
            width: 350px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-30px) rotate(-2deg); }
        }

        /* BOTÃO MEGA CAIXA */
        .mega-box-btn {
            margin-bottom: 50px;
            background: #3498db;
            border: 6px solid #fff;
            padding: 20px 60px;
            border-radius: 25px;
            color: #fff; font-size: 32px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 0 #2980b9, 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.1s;
        }

        .mega-box-btn:active {
            transform: translateY(10px);
            box-shadow: none;
        }

        /* OVERLAY DE RECOMPENSA ULTRA */
        #reward-screen {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999; justify-content: center; align-items: center;
        }

        .reward-card {
            background: #fff;
            padding: 10px; border-radius: 30px;
            width: 300px; text-align: center;
            animation: rewardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 12px solid #fff;
        }

        @keyframes rewardPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .rarity-banner {
            width: 110%; margin-left: -5%;
            padding: 10px 0; font-size: 28px;
            color: #fff; text-shadow: 2px 2px #000;
            clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
            margin-top: -40px;
        }

        .brawler-img { width: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.2)); }

        .btn-collect {
            background: #2ecc71; color: white;
            border: none; padding: 15px 40px;
            border-radius: 15px; margin-top: 20px;
            font-family: 'Lilita One'; font-size: 20px;
            cursor: pointer; box-shadow: 0 5px 0 #27ae60;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="res-item" style="color: #00FF00;">🟢 <span>2,450</span></div>
        <div class="res-item" style="color: #FFD700;">🟡 <span id="coins">10,000</span></div>
    </div>

    <div class="sidebar">
        <div class="side-btn" style="background: #e67e22;"></div>
        <div class="side-btn" style="background: #9b59b6;"></div>
    </div>

    <div class="stage">
        <img class="brawler-hero" src="https://vignette.wikia.nocookie.net/brawlstars/images/e/e4/Leon_Portrait.png">
        <button class="mega-box-btn" onclick="openBox()">ABRIR CAIXA</button>
    </div>

    <div id="reward-screen">
        <div class="reward-card" id="card-bg">
            <div id="rarity-name" class="rarity-banner">LENDÁRIO</div>
            <img id="reward-img" class="brawler-img" src="">
            <h2 id="reward-name" style="color: #333; font-size: 35px; margin: 10px 0;">CROW</h2>
            <button class="btn-collect" onclick="closeReward()">COLETAR</button>
        </div>
    </div>

    <script>
        const database = [
            { n: "Spike", r: "LENDÁRIO", c: "var(--gold)", i: "https://vignette.wikia.nocookie.net/brawlstars/images/1/19/Spike_Portrait.png" },
            { n: "Mortis", r: "MÍTICO", c: "var(--mythic)", i: "https://vignette.wikia.nocookie.net/brawlstars/images/0/0e/Mortis_Portrait.png" },
            { n: "El Primo", r: "RARO", c: "var(--rare)", i: "https://vignette.wikia.nocookie.net/brawlstars/images/5/5a/El_Primo_Portrait.png" }
        ];

        function openBox() {
            const item = database[Math.floor(Math.random() * database.length)];
            
            document.getElementById("reward-img").src = item.i;
            document.getElementById("reward-name").innerText = item.n;
            document.getElementById("rarity-name").innerText = item.r;
            document.getElementById("rarity-name").style.background = item.c;
            document.getElementById("card-bg").style.borderColor = item.r === "LENDÁRIO" ? "#FFD700" : "#fff";

            document.getElementById("reward-screen").style.display = "flex";
        }

        function closeReward() {
            document.getElementById("reward-screen").style.display = "none";
        }
    </script>
</body>
    </html>
